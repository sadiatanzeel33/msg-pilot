databases:
  - name: msg-pilot-db
    plan: free
    region: oregon
    databaseName: msgpilot
    user: msgpilot

services:
  # ── Backend API ──
  - type: web
    name: msg-pilot-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: msg-pilot-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://msg-pilot-frontend.onrender.com"]'
      - key: WA_SESSION_DIR
        value: ./wa_sessions
      - key: WA_HEADLESS
        value: "true"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: DEFAULT_MIN_DELAY
        value: "8"
      - key: DEFAULT_MAX_DELAY
        value: "25"
      - key: DAILY_SEND_LIMIT
        value: "500"

  # ── Frontend ──
  - type: web
    name: msg-pilot-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: ./frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: BACKEND_URL
        value: https://msg-pilot-api.onrender.com
